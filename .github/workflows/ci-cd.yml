name: CI-CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases
      actions: write   # Required for uploading release assets

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6.4.0
      with:
        node-version: 24
        cache: npm

    - name: Install dependencies
      run: npm ci

    # ---- Biome (format + lint) ----
    - name: Biome check
      run: npx biome ci .

    - name: Type check
      run: npx tsc --noEmit

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: fs
        format: table
        exit-code: 1

    - name: Run the test suite
      run: bun test

  semgrep:
    name: Semgrep Scan
    needs: validate
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6

      - name: Static Security Testing
        run: semgrep scan --config auto



